<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password | SocialElite</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ==========================
PASTE CSS HERE
========================== */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{

--primary:#FFD54A;
--primary-hover:#FFC107;

--bg:#090909;
--card:#131313;

--border:rgba(255,255,255,.08);

--text:#ffffff;
--muted:#b8b8b8;

--radius:18px;

}

html{

scroll-behavior:smooth;

}

body{

font-family:"Inter",sans-serif;

background:var(--bg);

color:var(--text);

display:flex;

align-items:center;

justify-content:center;

min-height:100vh;

padding:20px;

}

/*==========================
CONTAINER
==========================*/

.signup-container{

width:100%;
max-width:480px;

}

.signup-card{

background:var(--card);

border:1px solid var(--border);

border-radius:24px;

padding:45px 35px;

box-shadow:0 20px 60px rgba(0,0,0,.35);

}

/*==========================
LOGO
==========================*/

.logo{

display:block;

text-align:center;

font-size:34px;

font-weight:800;

text-decoration:none;

color:var(--primary);

margin-bottom:25px;

}

.signup-card h1{

text-align:center;

font-size:34px;

margin-bottom:12px;

}

.subtitle{

text-align:center;

color:var(--muted);

font-size:15px;

line-height:1.6;

margin-bottom:35px;

}

/*==========================
FORM
==========================*/

.input-group{

margin-bottom:22px;

}

.input-group label{

display:block;

font-size:14px;

font-weight:600;

margin-bottom:10px;

}

.input-group input{

width:100%;

height:56px;

padding:0 18px;

background:#0f0f0f;

border:1px solid var(--border);

border-radius:14px;

color:#fff;

font-size:15px;

outline:none;

transition:.3s;

}

.input-group input:focus{

border-color:var(--primary);

box-shadow:0 0 0 3px rgba(255,213,74,.15);

}

.input-group input::placeholder{

color:#7f7f7f;

}

/*==========================
BUTTON
==========================*/

.signup-btn{

width:100%;

height:56px;

border:none;

border-radius:14px;

background:var(--primary);

color:#000;

font-size:16px;

font-weight:700;

cursor:pointer;

transition:.3s;

display:flex;

align-items:center;

justify-content:center;

gap:12px;

margin-top:10px;

}

.signup-btn:hover{

background:var(--primary-hover);

transform:translateY(-2px);

}

.signup-btn:disabled{

opacity:.7;

cursor:not-allowed;

transform:none;

}

/*==========================
LOADER
==========================*/

.loader{

width:18px;

height:18px;

border:3px solid rgba(0,0,0,.25);

border-top-color:#000;

border-radius:50%;

animation:spin .8s linear infinite;

}

.hidden{

display:none;

}

@keyframes spin{

to{

transform:rotate(360deg);

}

}

/*==========================
MESSAGE
==========================*/

#message{

margin-top:22px;

text-align:center;

font-size:15px;

font-weight:600;

min-height:22px;

line-height:1.5;

}

/*==========================
BOTTOM LINKS
==========================*/

.bottom-links{

margin-top:35px;

text-align:center;

}

.bottom-links p{

color:var(--muted);

font-size:15px;

}

.bottom-links a{

color:var(--primary);

text-decoration:none;

font-weight:700;

}

.bottom-links a:hover{

text-decoration:underline;

}

/*==========================
RESPONSIVE
==========================*/

@media(max-width:500px){

.signup-card{

padding:35px 22px;

}

.signup-card h1{

font-size:28px;

}

.logo{

font-size:30px;

}

}
</style>

</head>

<body>

<div class="signup-container">

<div class="signup-card">

<a href="index.html" class="logo">

SocialElite

</a>

<h1>Reset Password</h1>

<p class="subtitle">

Enter the verification code sent to your email and choose a new password.

</p>

<form id="resetPasswordForm">

<div class="input-group">

<label>Email Address</label>

<input
type="email"
id="email"
readonly
>

</div>

<div class="input-group">

<label>Verification Code</label>

<input
type="text"
id="otp"
placeholder="Enter 6-digit OTP"
maxlength="6"
required
>

</div>

<div class="input-group">

<label>New Password</label>

<input
type="password"
id="password"
placeholder="Minimum 8 characters"
required
>

</div>

<div class="input-group">

<label>Confirm Password</label>

<input
type="password"
id="confirmPassword"
placeholder="Confirm new password"
required
>

</div>

<button
type="submit"
id="resetBtn"
class="signup-btn"
>

<span id="btnText">

Reset Password

</span>

<span
id="loader"
class="loader hidden"
></span>

</button>

</form>

<div id="message"></div>

<div class="bottom-links">

<p>

Remembered your password?

<a href="login.html">

Login

</a>

</p>

</div>

</div>

</div>

<script>

/* ==========================
PASTE JAVASCRIPT HERE
========================== */
"use strict";

/*=========================================
CONFIG
=========================================*/

const API =
"https://dohxtukzxopwkvxeppdl.supabase.co/functions/v1/verify-reset-password-otp";

/*=========================================
ELEMENTS
=========================================*/

const form = document.getElementById("resetPasswordForm");

const email = document.getElementById("email");

const otp = document.getElementById("otp");

const password = document.getElementById("password");

const confirmPassword = document.getElementById("confirmPassword");

const resetBtn = document.getElementById("resetBtn");

const btnText = document.getElementById("btnText");

const loader = document.getElementById("loader");

const message = document.getElementById("message");

/*=========================================
LOAD EMAIL
=========================================*/

const params = new URLSearchParams(window.location.search);

email.value = params.get("email") || "";

/*=========================================
HELPERS
=========================================*/

function showMessage(text, color) {

message.textContent = text;

message.style.color = color;

}

function setLoading(state) {

resetBtn.disabled = state;

loader.classList.toggle("hidden", !state);

btnText.textContent = state
? "Resetting..."
: "Reset Password";

}

/*=========================================
RESET PASSWORD
=========================================*/

form.addEventListener("submit", async function(e){

e.preventDefault();

showMessage("", "");

if(password.value !== confirmPassword.value){

showMessage(
"Passwords do not match.",
"#ef4444"
);

return;

}

if(password.value.length < 8){

showMessage(
"Password must be at least 8 characters.",
"#ef4444"
);

return;

}

setLoading(true);

try{

const response = await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email:email.value.trim().toLowerCase(),

otp:otp.value.trim(),

newPassword:password.value

})

});

const result = await response.json();

if(!response.ok){

throw new Error(
result.error ||
result.message ||
"Password reset failed."
);

}

showMessage(

result.message ||
"Password reset successfully.",

"#22c55e"

);

setTimeout(function(){

window.location.href="login.html";

},1500);

}catch(err){

console.error(err);

showMessage(

err.message ||
"Failed to connect.",

"#ef4444"

);

}finally{

setLoading(false);

}

});
</script>

</body>
</html>
