<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account | SocialElite</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* CSS GOES HERE */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{

--primary:#FFD54A;
--primary-hover:#FFC107;

--bg:#090909;
--card:#131313;

--border:rgba(255,255,255,.08);

--text:#ffffff;
--muted:#b8b8b8;

--radius:18px;

}

html{

scroll-behavior:smooth;

}

body{

font-family:"Inter",sans-serif;

background:var(--bg);

color:var(--text);

display:flex;

align-items:center;

justify-content:center;

min-height:100vh;

padding:20px;

}

/*==========================
CONTAINER
==========================*/

.signup-container{

width:100%;
max-width:480px;

}

.signup-card{

background:var(--card);

border:1px solid var(--border);

border-radius:24px;

padding:45px 35px;

box-shadow:0 20px 60px rgba(0,0,0,.35);

}

/*==========================
LOGO
==========================*/

.logo{

display:block;

text-align:center;

font-size:34px;

font-weight:800;

text-decoration:none;

color:var(--primary);

margin-bottom:25px;

}

.signup-card h1{

text-align:center;

font-size:34px;

margin-bottom:12px;

}

.subtitle{

text-align:center;

color:var(--muted);

font-size:15px;

line-height:1.6;

margin-bottom:35px;

}

/*==========================
FORM
==========================*/

.input-group{

margin-bottom:22px;

}

.input-group label{

display:block;

font-size:14px;

font-weight:600;

margin-bottom:10px;

}

.input-group input{

width:100%;

height:56px;

padding:0 18px;

background:#0f0f0f;

border:1px solid var(--border);

border-radius:14px;

color:#fff;

font-size:15px;

outline:none;

transition:.3s;

}

.input-group input:focus{

border-color:var(--primary);

box-shadow:0 0 0 3px rgba(255,213,74,.15);

}

.input-group input::placeholder{

color:#7f7f7f;

}

/*==========================
BUTTON
==========================*/

.signup-btn{

width:100%;

height:56px;

border:none;

border-radius:14px;

background:var(--primary);

color:#000;

font-size:16px;

font-weight:700;

cursor:pointer;

transition:.3s;

display:flex;

align-items:center;

justify-content:center;

gap:12px;

margin-top:10px;

}

.signup-btn:hover{

background:var(--primary-hover);

transform:translateY(-2px);

}

.signup-btn:disabled{

opacity:.7;

cursor:not-allowed;

transform:none;

}

/*==========================
LOADER
==========================*/

.loader{

width:18px;

height:18px;

border:3px solid rgba(0,0,0,.25);

border-top-color:#000;

border-radius:50%;

animation:spin .8s linear infinite;

}

.hidden{

display:none;

}

@keyframes spin{

to{

transform:rotate(360deg);

}

}

/*==========================
MESSAGE
==========================*/

#message{

margin-top:22px;

text-align:center;

font-size:15px;

font-weight:600;

min-height:22px;

line-height:1.5;

}

/*==========================
BOTTOM LINKS
==========================*/

.bottom-links{

margin-top:35px;

text-align:center;

}

.bottom-links p{

color:var(--muted);

font-size:15px;

}

.bottom-links a{

color:var(--primary);

text-decoration:none;

font-weight:700;

}

.bottom-links a:hover{

text-decoration:underline;

}

/*==========================
RESPONSIVE
==========================*/

@media(max-width:500px){

.signup-card{

padding:35px 22px;

}

.signup-card h1{

font-size:28px;

}

.logo{

font-size:30px;

}

}

</style>

</head>

<body>

<div class="signup-container">

<div class="signup-card">

<a href="index.html" class="logo">
SocialElite
</a>

<h1>Create Account</h1>

<p class="subtitle">
Create your SocialElite account and receive a verification code.
</p>

<form id="signupForm">

<div class="input-group">

<label>Email Address</label>

<input
type="email"
id="email"
placeholder="Enter your email address"
required
>

</div>

<div class="input-group">

<label>Referral Code (Optional)</label>

<input
type="text"
id="referralCode"
placeholder="Referral code"
>

</div>

<button
type="submit"
id="signupBtn"
class="signup-btn"
>

<span id="btnText">
Send OTP
</span>

<span id="loader" class="loader hidden"></span>

</button>

</form>

<div id="message"></div>

<div class="bottom-links">

<p>
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

</div>

</div>

<script>

/* JAVASCRIPT GOES HERE */
"use strict";

/*==========================
CONFIG
==========================*/

const API =
"https://dohxtukzxopwkvxeppdl.supabase.co/functions/v1/verify-signup-otp/functions/v1/send-signup-otp";

/*==========================
ELEMENTS
==========================*/

const form = document.getElementById("signupForm");

const email = document.getElementById("email");

const referralCode = document.getElementById("referralCode");

const signupBtn = document.getElementById("signupBtn");

const btnText = document.getElementById("btnText");

const loader = document.getElementById("loader");

const message = document.getElementById("message");

/*==========================
MESSAGE
==========================*/

function showMessage(text, color){

message.textContent = text;

message.style.color = color;

}

/*==========================
LOADING
==========================*/

function setLoading(state){

signupBtn.disabled = state;

loader.classList.toggle("hidden", !state);

btnText.textContent = state ? "Sending OTP..." : "Send OTP";

}

/*==========================
SIGNUP
==========================*/

form.addEventListener("submit", async function(e){

e.preventDefault();

showMessage("", "");

const userEmail = email.value.trim().toLowerCase();

const referral = referralCode.value.trim();

if(userEmail === ""){

showMessage("Email is required.","#ff5b5b");

return;

}

try{

setLoading(true);
alert("About to send request");
const response = await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email:userEmail,
referral_code:referral || null
})
});
alert("Response received");
const text = await response.text();

console.log(text);

const result = JSON.parse(text);
const result = await response.json();

if(!response.ok){

throw new Error(

result.error ||

result.message ||

"Signup failed."

);

}

if(result.success){

showMessage(

result.message || "OTP sent successfully.",

"#34d399"

);

setTimeout(()=>{

window.location.href =

`verify-otp.html?email=${encodeURIComponent(userEmail)}`;

},1200);

return;

}

throw new Error(

result.error ||

result.message ||

"Signup failed."

);

  }catch (error) {

console.error(error);

showMessage(

error.name + ": " + error.message,

"#ef4444"

);

  }
finally{

setLoading(false);

}

});
</script>

</body>
  </html>
